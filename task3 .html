<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Quiz Game</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #0f0c29;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .container {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 30px 24px;
    width: 100%;
    max-width: 600px;
    color: #fff;
  }
  h1 {
    text-align: center;
    font-size: 1.6rem;
    margin-bottom: 4px;
    color: #00e5ff;
  }
  .subtitle {
    text-align: center;
    font-size: 0.8rem;
    color: #aaa;
    margin-bottom: 24px;
  }
  input[type="text"] {
    width: 100%;
    padding: 12px 16px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.08);
    color: #fff;
    font-size: 1rem;
    margin-bottom: 14px;
    outline: none;
  }
  input::placeholder { color: #aaa; }
  button {
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(90deg, #00e5ff, #7b2ff7);
    color: #fff;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  button:hover { opacity: 0.85; }

  /* Progress */
  .progress-bar {
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
    height: 6px;
    margin-bottom: 20px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #00e5ff, #7b2ff7);
    border-radius: 10px;
    transition: width 0.4s ease;
  }
  .q-meta {
    display: flex;
    justify-content: space-between;
    font-size: 0.78rem;
    color: #aaa;
    margin-bottom: 10px;
  }
  .badge {
    background: rgba(0,229,255,0.15);
    color: #00e5ff;
    border: 1px solid #00e5ff55;
    padding: 2px 10px;
    border-radius: 20px;
    font-size: 0.72rem;
    font-weight: 600;
  }
  .question {
    font-size: 1.05rem;
    font-weight: 500;
    margin-bottom: 18px;
    line-height: 1.5;
  }

  /* MCQ Options */
  .options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 18px; }
  .opt-btn {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 10px;
    padding: 12px 16px;
    text-align: left;
    color: #fff;
    font-size: 0.95rem;
    cursor: pointer;
    transition: all 0.2s;
    width: 100%;
  }
  .opt-btn:hover:not(:disabled) { background: rgba(0,229,255,0.15); border-color: #00e5ff; }
  .opt-btn.correct { background: rgba(0,200,100,0.2); border-color: #00c864; }
  .opt-btn.wrong { background: rgba(255,60,60,0.2); border-color: #ff3c3c; }
  .opt-btn:disabled { cursor: default; }

  /* Multi select */
  .multi-hint { font-size: 0.78rem; color: #aaa; margin-bottom: 10px; }
  .opt-btn.selected { background: rgba(123,47,247,0.3); border-color: #7b2ff7; }

  /* Fill blank */
  .fill-input {
    width: 100%;
    padding: 12px 16px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.08);
    color: #fff;
    font-size: 1rem;
    margin-bottom: 14px;
    outline: none;
  }

  .feedback {
    text-align: center;
    font-size: 0.9rem;
    font-weight: 600;
    padding: 8px;
    border-radius: 8px;
    margin-bottom: 14px;
    display: none;
  }
  .feedback.correct { background: rgba(0,200,100,0.15); color: #00c864; display: block; }
  .feedback.wrong { background: rgba(255,60,60,0.15); color: #ff6b6b; display: block; }

  /* Result */
  .result { text-align: center; }
  .result .score { font-size: 3rem; font-weight: 700; color: #00e5ff; margin: 10px 0; }
  .result .out-of { font-size: 1rem; color: #aaa; margin-bottom: 6px; }
  .result .percent { font-size: 1.2rem; font-weight: 600; margin-bottom: 10px; }
  .result .remark { font-size: 1rem; color: #aaa; margin-bottom: 24px; }
  .result-bar {
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
    height: 10px;
    margin: 12px 0 20px;
    overflow: hidden;
  }
  .result-fill {
    height: 100%;
    background: linear-gradient(90deg, #00e5ff, #7b2ff7);
    border-radius: 10px;
    transition: width 1s ease;
  }

  .hidden { display: none; }
</style>
</head>
<body>
<div class="container">

  <!-- START SCREEN -->
  <div id="startScreen">
    <h1>🎯 Quiz Game</h1>
    <p class="subtitle">SkillCraft Technology — Task 03</p>
    <input type="text" id="nameInput" placeholder="Enter your name..." />
    <button onclick="startQuiz()">Start Quiz 🚀</button>
  </div>

  <!-- QUIZ SCREEN -->
  <div id="quizScreen" class="hidden">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="q-meta">
      <span id="qCounter">Q1 of 8</span>
      <span id="typeBadge" class="badge">MCQ</span>
    </div>
    <div class="question" id="questionText"></div>
    <div id="questionBody"></div>
    <div class="feedback" id="feedback"></div>
    <button id="nextBtn" onclick="nextQuestion()" class="hidden">Next →</button>
  </div>

  <!-- RESULT SCREEN -->
  <div id="resultScreen" class="hidden result">
    <h1>📊 Quiz Complete!</h1>
    <p class="out-of" id="resultName"></p>
    <div class="score" id="scoreText"></div>
    <div class="result-bar"><div class="result-fill" id="resultFill" style="width:0%"></div></div>
    <div class="percent" id="percentText"></div>
    <div class="remark" id="remarkText"></div>
    <button onclick="restartQuiz()">🔁 Play Again</button>
  </div>

</div>

<script>
const questions = [
  { type:"mcq", q:"What is the output of print(2 ** 3)?", opts:["A) 6","B) 8","C) 9","D) 12"], ans:"B" },
  { type:"mcq", q:"Which data type stores True/False in Python?", opts:["A) int","B) str","C) bool","D) float"], ans:"C" },
  { type:"multi", q:"Which are Python data structures? (Select all correct)", opts:["A) List","B) Tree","C) Dictionary","D) Tuple"], ans:["A","C","D"] },
  { type:"fill", q:"To take input from user in Python, we use the ________ function.", ans:"input" },
  { type:"mcq", q:"What does len([1, 2, 3]) return?", opts:["A) 2","B) 4","C) 3","D) 1"], ans:"C" },
  { type:"fill", q:"________ keyword is used to define a function in Python.", ans:"def" },
  { type:"multi", q:"Which are valid Python loops? (Select all correct)", opts:["A) for","B) repeat","C) while","D) loop"], ans:["A","C"] },
  { type:"mcq", q:"Which keyword handles exceptions in Python?", opts:["A) catch","B) except","C) error","D) handle"], ans:"B" },
];

let current = 0, score = 0, playerName = "", selectedMulti = [];

function startQuiz() {
  playerName = document.getElementById("nameInput").value.trim();
  if (!playerName) { alert("Please enter your name!"); return; }
  document.getElementById("startScreen").classList.add("hidden");
  document.getElementById("quizScreen").classList.remove("hidden");
  loadQuestion();
}

function loadQuestion() {
  selectedMulti = [];
  const q = questions[current];
  document.getElementById("progressFill").style.width = ((current / questions.length) * 100) + "%";
  document.getElementById("qCounter").textContent = `Q${current+1} of ${questions.length}`;
  document.getElementById("typeBadge").textContent = q.type === "mcq" ? "MCQ" : q.type === "multi" ? "Multi-Select" : "Fill Blank";
  document.getElementById("questionText").textContent = q.q;
  document.getElementById("feedback").className = "feedback";
  document.getElementById("nextBtn").classList.add("hidden");

  const body = document.getElementById("questionBody");
  body.innerHTML = "";

  if (q.type === "mcq") {
    const div = document.createElement("div"); div.className = "options";
    q.opts.forEach(opt => {
      const btn = document.createElement("button");
      btn.className = "opt-btn"; btn.textContent = opt;
      btn.onclick = () => checkMCQ(opt[0], btn);
      div.appendChild(btn);
    });
    body.appendChild(div);
  } else if (q.type === "multi") {
    const hint = document.createElement("p"); hint.className = "multi-hint";
    hint.textContent = "Select all correct answers, then click Submit.";
    body.appendChild(hint);
    const div = document.createElement("div"); div.className = "options";
    q.opts.forEach(opt => {
      const btn = document.createElement("button");
      btn.className = "opt-btn"; btn.textContent = opt;
      btn.onclick = () => toggleMulti(opt[0], btn);
      div.appendChild(btn);
    });
    body.appendChild(div);
    const sub = document.createElement("button");
    sub.textContent = "Submit ✔"; sub.id = "submitMulti";
    sub.onclick = checkMulti;
    body.appendChild(sub);
  } else {
    const inp = document.createElement("input");
    inp.type = "text"; inp.className = "fill-input"; inp.placeholder = "Type your answer...";
    inp.id = "fillAns";
    inp.onkeydown = e => { if (e.key === "Enter") checkFill(); };
    body.appendChild(inp);
    const sub = document.createElement("button");
    sub.textContent = "Submit ✔";
    sub.onclick = checkFill;
    body.appendChild(sub);
    setTimeout(() => inp.focus(), 100);
  }
}

function checkMCQ(sel, btn) {
  const q = questions[current];
  document.querySelectorAll(".opt-btn").forEach(b => b.disabled = true);
  if (sel === q.ans) { btn.classList.add("correct"); showFeedback(true); score++; }
  else {
    btn.classList.add("wrong");
    document.querySelectorAll(".opt-btn").forEach(b => { if (b.textContent[0] === q.ans) b.classList.add("correct"); });
    showFeedback(false, q.ans);
  }
  document.getElementById("nextBtn").classList.remove("hidden");
}

function toggleMulti(letter, btn) {
  if (selectedMulti.includes(letter)) {
    selectedMulti = selectedMulti.filter(l => l !== letter);
    btn.classList.remove("selected");
  } else {
    selectedMulti.push(letter);
    btn.classList.add("selected");
  }
}

function checkMulti() {
  const q = questions[current];
  const correct = JSON.stringify([...q.ans].sort()) === JSON.stringify([...selectedMulti].sort());
  document.querySelectorAll(".opt-btn").forEach(b => b.disabled = true);
  document.getElementById("submitMulti").disabled = true;
  if (correct) { score++; showFeedback(true); }
  else showFeedback(false, q.ans.join(", "));
  document.getElementById("nextBtn").classList.remove("hidden");
}

function checkFill() {
  const q = questions[current];
  const val = document.getElementById("fillAns").value.trim().toLowerCase();
  document.getElementById("fillAns").disabled = true;
  if (val === q.ans.toLowerCase()) { score++; showFeedback(true); }
  else showFeedback(false, q.ans);
  document.getElementById("nextBtn").classList.remove("hidden");
}

function showFeedback(correct, ans) {
  const fb = document.getElementById("feedback");
  fb.className = "feedback " + (correct ? "correct" : "wrong");
  fb.textContent = correct ? "✅ Correct!" : `❌ Wrong! Answer: ${ans}`;
}

function nextQuestion() {
  current++;
  if (current < questions.length) loadQuestion();
  else showResult();
}

function showResult() {
  document.getElementById("quizScreen").classList.add("hidden");
  document.getElementById("resultScreen").classList.remove("hidden");
  const pct = Math.round((score / questions.length) * 100);
  document.getElementById("resultName").textContent = `Well done, ${playerName}!`;
  document.getElementById("scoreText").textContent = `${score} / ${questions.length}`;
  document.getElementById("percentText").textContent = `${pct}%`;
  document.getElementById("remarkText").textContent =
    pct === 100 ? "🏆 Perfect Score! Outstanding!" :
    pct >= 75 ? "🥇 Great job! Keep it up!" :
    pct >= 50 ? "👍 Good effort! Keep practicing!" : "💪 Don't give up! Try again!";
  setTimeout(() => document.getElementById("resultFill").style.width = pct + "%", 100);
}

function restartQuiz() {
  current = 0; score = 0;
  document.getElementById("resultScreen").classList.add("hidden");
  document.getElementById("startScreen").classList.remove("hidden");
  document.getElementById("nameInput").value = "";
}
</script>
</body>
</html>
